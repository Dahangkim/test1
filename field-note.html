<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>활동가 조사메모 입력</title>
<link rel="icon" type="image/svg+xml" href="./favicon.svg" />
<script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script defer src="./config.js"></script>
<script defer src="./js/supabase-client.js?v=20260627-location"></script>
<script defer src="./js/reports.js?v=20260627-location"></script>
<style>
:root{--ink:#07111f;--muted:#64748b;--line:#dbe7ff;--blue:#0047ff;--lime:#ccff00;--pale:#f6f9ff;--red:#e11d48}
*{box-sizing:border-box}body{margin:0;font-family:Pretendard,SUIT,"Noto Sans KR",system-ui,sans-serif;color:var(--ink);background:#fff}header{border-bottom:2px solid var(--blue);background:#fff}.wrap{max-width:920px;margin:0 auto;padding:16px}h1{margin:0;color:var(--blue);font-size:23px;font-weight:950;letter-spacing:-.04em}.sub{margin-top:6px;color:var(--muted);font-size:12px;font-weight:750;line-height:1.55}.card{border:1.5px solid var(--line);border-radius:12px;padding:14px;margin-top:12px;background:#fff}.grid{display:grid;gap:10px}.two{grid-template-columns:1fr 1fr}label{display:grid;gap:5px;font-size:12px;color:var(--muted);font-weight:900}input,select,textarea{border:1.5px solid var(--line);padding:10px;font-family:inherit;font-size:14px;width:100%;background:#fff}textarea{min-height:130px;resize:vertical}button{border:1.5px solid var(--blue);background:#fff;color:var(--blue);font-weight:900;padding:10px 12px;border-radius:999px;cursor:pointer}.lime{background:var(--lime);color:var(--ink);border-color:var(--ink)}.notice{background:linear-gradient(90deg,var(--pale),#fff);border-left:4px solid var(--lime);padding:10px 12px;color:#24324a;font-size:12px;line-height:1.55;font-weight:650}.results{max-height:260px;overflow:auto;border-top:1px solid var(--line)}.result{padding:10px 0;border-bottom:1px solid var(--line);cursor:pointer;font-size:13px}.result:hover{background:var(--pale)}.result b{color:var(--blue)}.status{font-size:12px;color:var(--muted);font-weight:900}.hidden{display:none}@media(max-width:720px){.two{grid-template-columns:1fr}h1{font-size:20px}}
</style>
</head>
<body>
<header><div class="wrap"><h1>활동가 조사메모 입력</h1><div class="sub">업소를 검색하거나 직접 입력한 뒤 조사 메모를 남깁니다. 입력 내용은 공개 대시보드에 바로 표시되지 않고 관리자 검토 화면으로 접수됩니다.</div></div></header>
<main class="wrap">
<section class="card grid">
  <div class="notice">상담기록, 내담자 개인정보, 사건 관계자 식별정보, 내부 비공개자료는 입력하지 마세요.</div>
  <label>업소 검색<input id="shopSearch" type="search" placeholder="업소명·주소·행정동 검색"></label>
  <div class="results" id="shopResults"></div>
</section>
<section class="card">
  <form class="grid" id="fieldNoteForm">
    <input id="shopId" type="hidden">
    <div class="two grid">
      <label>업소명<input id="shopName" required placeholder="업소명"></label>
      <label>행정동<input id="dong" placeholder="행정동"></label>
    </div>
    <label>주소<input id="shopAddress" required placeholder="주소"></label>
    <div class="two grid">
      <label>조사자<input id="investigatorName" placeholder="조사자"></label>
      <label>조사일<input id="investigationDate" type="date"></label>
    </div>
    <div class="two grid">
      <label>현장확인 여부<select id="fieldCheck"><option value="">선택 안 함</option><option>미확인</option><option>확인</option><option>추가확인 필요</option></select></label>
      <label>현재 영업 추정<select id="openGuess"><option value="">선택 안 함</option><option>영업 추정</option><option>폐업/휴업 추정</option><option>불명</option></select></label>
    </div>
    <div class="two grid">
      <label>온라인 광고<select id="online"><option value="">선택 안 함</option><option>없음</option><option>발견</option><option>확인 필요</option></select></label>
      <label>출처 링크/확인 경로<input id="source" placeholder="URL 또는 확인 경로"></label>
    </div>
    <label>조사 메모<textarea id="memoText" placeholder="사실과 판단을 구분해 적어주세요. 개인정보는 입력하지 마세요."></textarea></label>
    <div class="status" id="submitStatus"></div>
    <button class="lime" type="submit">조사메모 접수</button>
  </form>
</section>
</main>
<script>
const esc=v=>String(v??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
let shops=[];

function shopId(s){return [s.name,s.address,s.openDate,s.closeDate].join("|")}

async function loadShops(){
  try{
    const html=await fetch("./jeju-research-dashboard.html").then(r=>r.text());
    const match=html.match(/const SHOP_DATA = (\[.*?\]);\nconst YEAR_SERIES/s);
    if(!match) throw new Error("업소 데이터를 찾지 못했습니다.");
    shops=JSON.parse(match[1]);
    renderResults("");
    applyUrlParams();
  }catch(err){
    document.getElementById("shopResults").innerHTML=`<div class="status" style="padding:10px">업소 검색 데이터를 불러오지 못했습니다. 업소명과 주소를 직접 입력하세요.</div>`;
  }
}

function renderResults(query){
  const q=query.trim().toLowerCase();
  const rows=(q?shops.filter(s=>[s.name,s.address,s.dong].join(" ").toLowerCase().includes(q)):shops.slice(0,20)).slice(0,60);
  document.getElementById("shopResults").innerHTML=rows.map(s=>`<div class="result" onclick='selectShop(${JSON.stringify(shopId(s))})'><b>${esc(s.name)}</b><br>${esc(s.address||"")}<br><span class="status">${esc(s.dong||"")} · ${esc(s.status||"")}</span></div>`).join("")||`<div class="status" style="padding:10px">검색 결과가 없습니다. 직접 입력할 수 있습니다.</div>`;
}

function selectShop(id){
  const s=shops.find(x=>shopId(x)===id);
  if(!s)return;
  document.getElementById("shopId").value=id;
  document.getElementById("shopName").value=s.name||"";
  document.getElementById("shopAddress").value=s.address||"";
  document.getElementById("dong").value=s.dong||"";
}

function applyUrlParams(){
  const params=new URLSearchParams(location.search);
  const id=params.get("shopId");
  if(id&&shops.length){
    selectShop(id);
    return;
  }
  if(id)document.getElementById("shopId").value=id;
  if(params.get("shopName"))document.getElementById("shopName").value=params.get("shopName");
  if(params.get("shopAddress"))document.getElementById("shopAddress").value=params.get("shopAddress");
  if(params.get("dong"))document.getElementById("dong").value=params.get("dong");
}

window.addEventListener("DOMContentLoaded",()=>{
  document.getElementById("investigationDate").value=new Date().toISOString().slice(0,10);
  document.getElementById("shopSearch").addEventListener("input",e=>renderResults(e.target.value));
  document.getElementById("fieldNoteForm").addEventListener("submit",async e=>{
    e.preventDefault();
    const status=document.getElementById("submitStatus");
    status.textContent="접수 중입니다.";
    try{
      const shopName=document.getElementById("shopName").value.trim();
      const shopAddress=document.getElementById("shopAddress").value.trim();
      await window.ReportService.submitFieldNote({
        shopId:document.getElementById("shopId").value || [shopName,shopAddress].join("|"),
        shopName,
        shopAddress,
        dong:document.getElementById("dong").value,
        investigatorName:document.getElementById("investigatorName").value,
        investigationDate:document.getElementById("investigationDate").value,
        fieldCheck:document.getElementById("fieldCheck").value,
        openGuess:document.getElementById("openGuess").value,
        online:document.getElementById("online").value,
        source:document.getElementById("source").value,
        text:document.getElementById("memoText").value
      });
      status.textContent="접수되었습니다.";
      e.target.reset();
      document.getElementById("investigationDate").value=new Date().toISOString().slice(0,10);
    }catch(err){
      status.textContent=err.message||"접수하지 못했습니다.";
    }
  });
  loadShops();
});
</script>
</body>
</html>
